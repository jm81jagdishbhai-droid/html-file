<!DOCTYPE html>
<html>
<head>
<style>
 div{
    background-color: blue;
    width: 150px;
    border: 20px solid green;
    padding: 50px;
    margin: 20px;
}
</style>
</head>
<body>
<h2>Box model</h2>   
<p>The CSS box model is essentially a box that wraps around every HTML element.</p>
<div>This text is the content of the box.width is 150px,
     We have added a 50px padding,
     20px margin and a 20px green border.</div>

</body>
</html>
