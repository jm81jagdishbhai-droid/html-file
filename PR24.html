<!DOCTYPE html>
<html>
<body>
<h1>Java script</h1>
<h2>Property Access using Dots</h2>
<p id="pr"></p>
<script>
const person={                    /*create object person*/
    firstname:"John",
    lastname:"Doe",
    age:50,
};

document.getElementById("pr").innerHTML= person.firstname + " is " + person.age;
</script>
</body>
</html>
