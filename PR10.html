<!DOCTYPE html>
<html>
<head>
<style>    
/* Selector everey fourth element among any group of nth-child() Pseudo-class*/

:nth-child(4){
   background-color: yellow;  
}    
/* Select the second element of div sibling */

div:nth-child(2){
    background-color: red;
}
/* Select the second li element in a list */
li:nth-child(2){
    background-color: lightgreen;
}

/* nth-child  odd or even p is specify color element */
p:nth-child(odd){.
    background-color: green;
}
p:nth-child(even){
    background-color: blueviolet;
}
</style>
</head>
<body>
<h1>practical of nth:child</h1>
<div>
  <p>This is some text.</p>
 </div>
 <div>
   <p>This is some text.</p>
 </div>
 <div>
   <p>This is some text.</p>  
 </div> 
 <ul>
  <li>First list item</li>
  <li>Second list item</li>
  <li>Third list item</li>
  <li>Fourth list item</li>
  <li>Fifth list item</li>
  </ul>
 </body>
 </html>
